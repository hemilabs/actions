name: Setup Node

description: Setups up Node.js, restores NPM cache and installs dependencies

inputs:
  node-version:
    description: The version of Node to install.
    default: ""
  package-manager:
    description: The package manager to use (npm, pnpm).
    default: "npm"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      if: inputs.package-manager == 'pnpm'
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ inputs.package-manager == 'pnpm' && '**/pnpm-lock.yaml' || '**/package-lock.json' }}
        node-version: ${{ inputs.node-version }}
        node-version-file: .nvmrc
    - run: npm ci
      if: inputs.package-manager == 'npm'
      shell: bash
    - run: pnpm install --frozen-lockfile
      if: inputs.package-manager == 'pnpm'
      shell: bash
