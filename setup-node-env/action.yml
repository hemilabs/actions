name: Setup Node

description: Setups up Node.js, restores NPM cache and installs dependencies

inputs:
  node-version:
    description: The version of Node to install.
    default: ""
  package-manager:
    description: The package manager to use (npm, pnpm).
    default: "npm"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      if: inputs.package-manager == 'pnpm'
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ inputs.package-manager == 'pnpm' && '**/pnpm-lock.yaml' || '**/package-lock.json' }}
        node-version: ${{ inputs.node-version }}
        node-version-file: .nvmrc
    - run: npm ci
      if: inputs.package-manager == 'npm'
      shell: bash
    - run: pnpm install --frozen-lockfile
      if: inputs.package-manager == 'pnpm'
      shell: bash
