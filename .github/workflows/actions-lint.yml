# GitHub Actions workflow to lint files in the hemilabs/actions repository.
name: "Lint"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "lint-${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=pnpm/pnpm versioning=semver
  PNPM_VERSION: "11.8.0"

jobs:
  prettier:
    name: "Prettier"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup pnpm ${{ env.PNPM_VERSION }}"
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "${{ env.PNPM_VERSION }}"

      - name: "Setup Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          check-latest: true
          cache: "pnpm"

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run lint"
        run: pnpm lint
